mode: Rule
log-level: silent
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:7874
  enhanced-mode: fake-ip
  default-nameserver:
  - https://223.5.5.5/dns-query
  nameserver:
  - https://cloudflare-dns.com/dns-query#match
  - https://dns.google/dns-query#match
  direct-nameserver:
  - https://223.5.5.5/dns-query
  - https://doh.pub/dns-query
  proxy-server-nameserver:
  - https://223.5.5.5/dns-query
  respect-rules: false
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
  - "rule-set:my_fake_ip_filter"

rule-providers:
  my_fake_ip_filter:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/taplus/CustomRules/refs/heads/main/rulesets/custom_list/my_fake_ip_filter.yaml"
    path: ./providers/rule-provider_my_fake_ip_filter.yaml
    interval: 86400
