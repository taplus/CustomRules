mode: Rule
log-level: silent
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:7874
  enhanced-mode: fake-ip
  default-nameserver:
  - https://223.5.5.5/dns-query
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  proxy-server-nameserver:
  - https://doh.pub/dns-query
  respect-rules: true
  fallback:
  - https://cloudflare-dns.com/dns-query
  - https://dns.google/dns-query  
  fallback-filter:
    geoip: true
    geoip-code: CN
    domain:
    - +.google.com
    - +.facebook.com
    - +.youtube.com
    - +.githubusercontent.com
    - +.googlevideo.com
    - +.msftconnecttest.com
    - +.msftncsi.com
    ipcidr:
    - ::/128
    - ::1/128
    - 2001::/32
    - 0.0.0.0/8
    - 10.0.0.0/8
    - 100.64.0.0/10
    - 127.0.0.0/8
    - 169.254.0.0/16
    - 172.16.0.0/12
    - 192.0.0.0/24
    - 192.0.2.0/24
    - 192.88.99.0/24
    - 192.168.0.0/16
    - 198.18.0.0/15
    - 198.51.100.0/24
    - 203.0.113.0/24
    - 224.0.0.0/4
    - 240.0.0.0/4
    - 255.255.255.255/32
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
  - "rule-set:my_fake_ip_filter"

rule-providers:
  my_fake_ip_filter:
    type: http
    behavior: domain
    url: "https://raw.githubusercontent.com/taplus/CustomRules/refs/heads/main/rulesets/custom_list/my_fake_ip_filter.yaml"
    path: ./providers/rule-provider_my_fake_ip_filter.yaml
    interval: 86400
