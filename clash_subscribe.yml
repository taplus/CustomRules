mode: rule
log-level: silent
allow-lan: true
ipv6: false
unified-delay: true
profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  respect-rules: false
  listen: 0.0.0.0:7874
  ipv6: false
  default-nameserver:
    - https://223.5.5.5/dns-query
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:my_fake_ip_filter"
  nameserver:
    - https://cloudflare-dns.com/dns-query#match
    - https://dns.google/dns-query#match
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
  direct-nameserver:
    #  - 192.168.X.1
    - https://223.5.5.5/dns-query

proxy-providers:
  provider1:
    type: http
    url: "url"
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    path: ./provider1.yaml
    proxy: DIRECT

  provider2:
    type: inline
    payload:
      - name: "XXX"
        type: XXX
        server: XXX
        port: XXX
        cipher: XXX
        password: "XXX"
        udp: true
        dialer-proxy: relay

proxy-groups:
  - name: Game
    type: select
    proxies:
      - 香港节点
      - DIRECT
      - 美国节点
      - 手动切换

  - name: AI
    type: select
    proxies:
      - 美国节点
      - 香港节点
      - 手动切换

  - name: Telegram
    type: select
    proxies:
      - 美国节点
      - 香港节点
      - 手动切换

  - name: Apple
    type: select
    proxies:
      - 美国节点
      - DIRECT
      - 香港节点
      - 手动切换

  - name: Microsoft
    type: select
    proxies:
      - 香港节点
      - DIRECT
      - 美国节点
      - 手动切换

  - name: CDN
    type: select
    proxies:
      - 美国低倍率
      - 香港低倍率
      - DIRECT
      - 手动切换

  - name: Download
    type: select
    proxies:
      - 美国低倍率
      - 香港低倍率
      - DIRECT
      - 手动切换

  - name: Google
    type: select
    proxies:
      - 美国节点
      - 香港节点
      - 手动切换

  - name: Emby
    type: select
    proxies:
      - 狮城节点
      - DIRECT
      - 美国低倍率
      - 香港低倍率
      - 日本节点
      - 台湾省节点
      - 韩国节点
      - 其他地区

  - name: Stream
    type: select
    proxies:
      - 美国低倍率
      - DIRECT
      - 香港低倍率
      - 狮城节点
      - 日本节点
      - 台湾省节点
      - 韩国节点
      - 其他地区

  - name: Proxy
    type: select
    proxies:
      - 美国节点
      - 香港节点
      - 狮城节点
      - 日本节点
      - 台湾省节点
      - 韩国节点
      - 其他地区
      - 手动切换
      - DIRECT

  - name: match
    type: select
    proxies:
      - 香港低倍率
      - 美国低倍率
      - 香港节点
      - 美国节点
      - 狮城节点
      - 日本节点
      - 台湾省节点
      - 韩国节点
      - 其他地区
      - DIRECT

  - name: relay
    type: load-balance
    include-all: true
    filter: "(?i)美|usa|unitedstates|united states"
    exclude-filter: "(?i)XXX"
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    strategy: round-robin

  - name: 香港节点
    type: select
    include-all: true
    filter: "(?i)港|hk|hongkong|hong kong"

  - name: 香港低倍率
    type: select
    include-all: true
    filter: "(?i)港|hk|hongkong|hong kong"

  - name: 美国节点
    type: select
    include-all: true
    filter: "(?i)美|usa|unitedstates|united states"

  - name: 美国低倍率
    type: select
    include-all: true
    filter: "(?i)美|usa|unitedstates|united states"

  - name: 狮城节点
    type: select
    include-all: true
    filter: "(?i)(新|sg|singapore)"

  - name: 台湾省节点
    type: select
    include-all: true
    filter: "(?i)台|tw|taiwan"

  - name: 日本节点
    type: select
    include-all: true
    filter: "(?i)日|jp|japan"

  - name: 韩国节点
    type: select
    include-all: true
    filter: "(?i)韩|kr|korea"

  - name: 其他地区
    type: select
    include-all: true
    filter: "(?i)^(?!.*(?:港|hk|hong kong|美|usa|united states|台|tw|taiwan|日|jp|japan|新|sg|singapore|韩|kr|korea|Expire|Traffic)).*"

  - name: 手动切换
    type: select
    include-all: true
    filter: "(?i)^(?!.*(?:Expire|Traffic)).*"

rules:
  - RULE-SET,lan,DIRECT
  - RULE-SET,direct,DIRECT
  - RULE-SET,custom_direct_list,DIRECT
  - RULE-SET,reject_drop,REJECT-DROP
  - RULE-SET,reject_domainset,REJECT
  - RULE-SET,reject,REJECT
  - RULE-SET,reject_no_drop,REJECT
  - RULE-SET,game_download_domainset,DIRECT
  - RULE-SET,steam_domainset,Game
  - RULE-SET,epicgames_domainset,Game
  - RULE-SET,ai,AI
  - RULE-SET,telegram,Telegram
  - RULE-SET,apple_cn,DIRECT
  - RULE-SET,icloud_private_relay_domainset,Apple
  - RULE-SET,apple_intelligence,Apple
  - RULE-SET,apple_cdn_domainset,Apple
  - RULE-SET,apple_services,Apple
  - RULE-SET,microsoft_cdn,Microsoft
  - RULE-SET,microsoft,Microsoft
  - RULE-SET,cdn_domainset,CDN
  - RULE-SET,cdn,CDN
  - RULE-SET,download_domainset,Download
  - RULE-SET,download,Download
  - RULE-SET,emby_domainset,Emby
  - RULE-SET,stream,Stream
  - RULE-SET,google,Google
  - RULE-SET,global,Proxy
  - RULE-SET,domestic,DIRECT
  - RULE-SET,lan_ip,DIRECT
  - RULE-SET,reject_ip,REJECT
  - RULE-SET,telegram_ip,Telegram
  - RULE-SET,apple_services_ip,Apple
  - RULE-SET,cdn_ip,CDN
  - RULE-SET,download_ip,Download
  - RULE-SET,stream_ip,Stream
  - RULE-SET,domestic_ip,DIRECT
  - RULE-SET,china_ip,DIRECT
  - MATCH,match

