mode: rule
log-level: silent
allow-lan: true
ipv6: false
unified-delay: true

dns:
  enable: true
  enhanced-mode: redir-host
  respect-rules: false
  listen: 0.0.0.0:7874
  ipv6: false
  default-nameserver:
    - https://223.5.5.5/dns-query
  nameserver:
    - 223.5.5.5
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
  direct-nameserver:
    - 223.5.5.5

proxy-providers:
  provider1:
    type: http
    url: "XXX"
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    path: ./provider1.yaml
    proxy: DIRECT

proxy-groups:
  - name: Game
    type: select
    proxies:
      - 香港节点
      - DIRECT
      - 美国节点
      - 手动切换

  - name: Proxy
    type: select
    proxies:
      - 美国节点
      - 香港节点
      - DIRECT
      - 手动切换

  - name: match
    type: select
    proxies:
      - DIRECT
      - 香港节点
      - 美国节点
      - 手动切换

  - name: 香港节点
    type: url-test
    include-all: true
    filter: "(?i)港|hk|hongkong|hong kong"
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    tolerance: 50

  - name: 美国节点
    type: url-test
    include-all: true
    filter: "(?i)美|usa|unitedstates|united states"
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    tolerance: 50

  - name: 手动切换
    type: select
    include-all: true
    filter: "(?i)^(?!.*(?:Expire|Traffic)).*"

rules:
  - RULE-SET,lan,DIRECT
  - RULE-SET,direct,DIRECT
  - RULE-SET,custom_direct_list,DIRECT
  - RULE-SET,game_download_domainset,DIRECT
  - RULE-SET,game_download,DIRECT
  - RULE-SET,game_download_cn,DIRECT
  - RULE-SET,steam_domainset,Game
  - RULE-SET,epicgames_domainset,Game
  - RULE-SET,gog_domainset,Game
  - RULE-SET,ubisoft_domainset,Game
  - RULE-SET,rockstar_domainset,Game
  - RULE-SET,xbox_domainset,Game
  - RULE-SET,playstation_domainset,Game
  - RULE-SET,sony,Game
  - RULE-SET,nintendo_domainset,Game
  - RULE-SET,ea_domainset,Game
  - RULE-SET,origin,Game
  - RULE-SET,blizzard,Game
  - RULE-SET,battle,Game
  - RULE-SET,2kgames,Game
  - RULE-SET,finalgame,Game
  - RULE-SET,global,Proxy
  - RULE-SET,lan_ip,DIRECT
  - MATCH,match

